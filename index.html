<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- tailwind and daisy ui cnd link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn link  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font geist link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- log in form  -->

   <section class="min-h-screen max-w-md mx-auto bg-base-200">
      <!-- logo import -->
      <div class="pt-40 max-w-[250px] mx-auto text-center">
        <img class="mx-auto my-4" src="./assets/github-logo.png" alt="" />
        <h1 class="text-2xl font-semibold text-[#1F2937] mb-2">GitHub Issues Tracker</h1>
        <p class="text-lg text-[#64748B]">Sign in to manage your issues</p>
      </div>
    <fieldset class="fieldset min-h-screen  bg-base-200 p-10">


  <label class="label text-[#1F2937] font-medium text-lg">Username</label>
  <input type="text" class="input w-full" placeholder="Enter your user name" />
  <br>

  <label class="label  text-[#1F2937] font-medium text-lg">Password</label>
  <input type="password" class="input w-full" placeholder="Enter your Password" />
  <br>

  <button class="btn btn-primary mt-4 text-lg">Sign in</button>
</fieldset>
</section>
  </body>
</html>
