<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | GitHub Issues Tracker</title>

    <!-- tailwind and daisy ui cnd link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn link  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font geist link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- navbar section  -->
    <header>
      <div class="navbar bg-base-100 shadow-sm px-5">
        <img class="h-10 w-10" src="./assets/github-logo.png" alt="" />
        <div class="flex-1">
          <a class="btn btn-ghost text-xl text-[#1F2937]">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search Issues"
            class="input input-bordered w-24 md:w-auto"
          />

          <div>
            <button class="btn btn-primary">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- issue selection btn  section  -->
    <section class="container mx-auto mt-12">
      <div id="btn-container" class="navbar bg-base-300 gap-6">
        <button id="all-btn" class="btn btn-primary btn-primary text-xl">All</button>
        <button id="open-btn" class="btn btn-outline btn-primary text-xl">Open</button>
        <button id="closed-btn" class="btn btn-outline btn-primary text-xl">Closed</button>
      </div>
    </section>

    <!-- how many issues have? display section  -->
    <section class="container mx-auto mt-4">
      <div class="navbar bg-base-200 flex justify-between px-5">
        <div class="flex items-center gap-2">
          <img
            class="border-slate-200 bg-slate-200 h-10 w-10 p-2 rounded-full"
            src="./assets/Aperture.png"
            alt=""
          />
          <div>
            <h3 class="text-2xl font-semibold text-[#1F2937]"><span id="issues"></span> Issues</h3>
            <p class="text-lg text-[#64748B]">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex gap-4">
            <p class="text-sm font-medium">
          <i class="fa-solid fa-circle-dot text-green-500"></i> Open
        </p>
        <p class="text-sm font-medium">
          <i class="fa-solid fa-circle-dot text-purple-600"></i> Closed
        </p>
        </div>
      </div>
    </section>


    <!-- display issues card section  -->
    <section class="container mx-auto my-5">
        <div id="issues-card-container" class="grid grid-cols-1 md:grid-cols-3 gap-5 bg-base-300 p-8 rounded-xl ">  
            
        </div>

    </section>

    <!-- display open issues  -->
      <section class="container mx-auto my-5">
        <div id="open-issues-card-container" class="grid grid-cols-1 md:grid-cols-3 gap-5 bg-base-300 p-8 rounded-xl hidden">  
            
        </div>

    </section>

     <!-- display closed issues  -->
      <section class="container mx-auto my-5">
        <div id="closed-issues-card-container" class="grid grid-cols-1 md:grid-cols-3 gap-5 bg-base-300 p-8 rounded-xl hidden">  
            
        </div>

    </section>

    <script src="./home.js"></script>
  </body>
</html>
